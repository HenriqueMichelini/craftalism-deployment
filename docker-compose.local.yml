services:
  # Local dev prefers source build contexts at the app subdirectories
  # used by the existing Dockerfiles, for example ../craftalism-api/java.
  auth-server:
    image: craftalism-authorization-server:local
    build:
      context: ${AUTH_SERVER_BUILD_CONTEXT:-../craftalism-authorization-server/java}
      dockerfile: ${AUTH_SERVER_DOCKERFILE:-Dockerfile}

  api:
    image: craftalism-api:local
    build:
      context: ${API_BUILD_CONTEXT:-../craftalism-api/java}
      dockerfile: ${API_DOCKERFILE:-Dockerfile}

  dashboard:
    image: craftalism-dashboard:local
    build:
      context: ${DASHBOARD_BUILD_CONTEXT:-../craftalism-dashboard/react}
      dockerfile: ${DASHBOARD_DOCKERFILE:-Dockerfile}

  minecraft-init:
    # Local-only one-shot init that prepares the named volume permissions and plugin jar.
    image: itzg/minecraft-server:${MINECRAFT_IMAGE_VERSION:-java21}@${MINECRAFT_IMAGE_DIGEST:?Set MINECRAFT_IMAGE_DIGEST to a pinned sha256 digest}
    user: "0:0"
    restart: "no"
    entrypoint:
      - /bin/sh
      - -ec
      - |
        mkdir -p /data/plugins
        install -m 0644 -o minecraft -g minecraft /bootstrap/craftalism-economy.jar /data/plugins/craftalism-economy.jar
        install -m 0644 -o minecraft -g minecraft /bootstrap/craftalism-market.jar /data/plugins/craftalism-market.jar
        chown minecraft:minecraft /data/plugins
        chmod 775 /data/plugins
    volumes:
      - minecraft_data:/data
      - ${ECONOMY_PLUGIN_JAR:?Set ECONOMY_PLUGIN_JAR to a locally built craftalism-economy jar}:/bootstrap/craftalism-economy.jar:ro
      - ${MARKET_PLUGIN_JAR:?Set MARKET_PLUGIN_JAR to a locally built craftalism-market jar}:/bootstrap/craftalism-market.jar:ro

  minecraft:
    # Dev should use a locally built plugin jar instead of release downloads.
    environment:
      PLUGINS: ""
      ONLINE_MODE: ${MINECRAFT_ONLINE_MODE:-TRUE}
    depends_on:
      api:
        condition: service_healthy
      minecraft-init:
        condition: service_completed_successfully
    volumes:
      - minecraft_data:/data
    ports:
      - "25575:25575"
