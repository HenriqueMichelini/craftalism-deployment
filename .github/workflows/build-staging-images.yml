name: build-staging-images

on:
  push:
    branches:
      - main
      - 'feature/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: henriquemichelini

jobs:
  build-service-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: craftalism-api
            context: https://github.com/HenriqueMichelini/craftalism-api.git#${{ github.ref_name }}
          - service: craftalism-authorization-server
            context: https://github.com/HenriqueMichelini/craftalism-authorization-server.git#${{ github.ref_name }}
          - service: craftalism-dashboard
            context: https://github.com/HenriqueMichelini/craftalism-dashboard.git#${{ github.ref_name }}

    steps:
      - name: Checkout deployment repo
        uses: actions/checkout@v4

      - name: Set branch slug and tags
        id: meta
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          BRANCH_SLUG="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9._-]#-#g')"
          IMAGE_TAG="${BRANCH_SLUG}-${SHORT_SHA}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "branch_slug=${BRANCH_SLUG}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.service }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.service }}:${{ steps.meta.outputs.short_sha }}

      - name: Staging tag hint
        shell: bash
        run: |
          echo "${{ matrix.service }} tag: ${{ steps.meta.outputs.image_tag }}"
