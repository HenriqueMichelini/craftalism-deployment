services:
  minecraft-modded:
    image: ${FRIEND_MODDED_IMAGE:-itzg/minecraft-server:java21}
    container_name: craftalism-friend-modded
    environment:
      EULA: "TRUE"
      TYPE: ${FRIEND_MODDED_TYPE:?Set FRIEND_MODDED_TYPE to FORGE, FABRIC, NEOFORGE, or QUILT}
      VERSION: ${FRIEND_MODDED_MINECRAFT_VERSION:?Set FRIEND_MODDED_MINECRAFT_VERSION to the Minecraft version required by the mods}
      MODS: ${FRIEND_MODDED_MOD_URLS:?Set FRIEND_MODDED_MOD_URLS to comma-separated mod jar URLs}
      INIT_MEMORY: ${FRIEND_MODDED_INIT_MEMORY:-1G}
      MEMORY: ${FRIEND_MODDED_MEMORY:-2G}
      MAX_PLAYERS: ${FRIEND_MODDED_MAX_PLAYERS:-8}
      DIFFICULTY: ${FRIEND_MODDED_DIFFICULTY:-normal}
      MODE: ${FRIEND_MODDED_MODE:-survival}
      MOTD: ${FRIEND_MODDED_MOTD:-Craftalism Modded Friends Server}
      ONLINE_MODE: ${FRIEND_MODDED_ONLINE_MODE:-TRUE}
      VIEW_DISTANCE: ${FRIEND_MODDED_VIEW_DISTANCE:-6}
      SIMULATION_DISTANCE: ${FRIEND_MODDED_SIMULATION_DISTANCE:-4}
      ENABLE_RCON: "TRUE"
      RCON_PASSWORD: ${FRIEND_MODDED_RCON_PASSWORD:?Set FRIEND_MODDED_RCON_PASSWORD to a strong value}
      RCON_PORT: 25575
      REMOVE_OLD_MODS: ${FRIEND_MODDED_REMOVE_OLD_MODS:-FALSE}
    volumes:
      - minecraft_modded_data:/data
    ports:
      - "${FRIEND_MODDED_PORT:-25565}:25565"
      - "${FRIEND_MODDED_RCON_PORT:-25575}:25575"
    mem_limit: ${FRIEND_MODDED_MEM_LIMIT:-3g}
    mem_reservation: ${FRIEND_MODDED_MEM_RESERVATION:-2g}
    restart: unless-stopped
    stdin_open: true
    tty: true

volumes:
  minecraft_modded_data:
    driver: local
