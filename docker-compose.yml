services:
  edge:
    image: ${CADDY_IMAGE:-caddy:2.9-alpine}
    container_name: craftalism-edge
    profiles:
      - standalone-edge
    depends_on:
      auth-server:
        condition: service_healthy
      dashboard:
        condition: service_healthy
    environment:
      DASHBOARD_SITE_ADDRESS: ${DASHBOARD_SITE_ADDRESS:-dashboard.localhost}
      AUTH_SITE_ADDRESS: ${AUTH_SITE_ADDRESS:-auth.localhost}
      DASHBOARD_BASIC_AUTH_USERNAME: ${DASHBOARD_BASIC_AUTH_USERNAME:-unused-local-user}
      DASHBOARD_BASIC_AUTH_PASSWORD_HASH: ${DASHBOARD_BASIC_AUTH_PASSWORD_HASH:-unused-local-hash}
    ports:
      - "${EDGE_HTTP_PORT:-80}:80"
      - "${EDGE_HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    mem_limit: ${EDGE_MEM_LIMIT:-128m}
    mem_reservation: ${EDGE_MEM_RESERVATION:-64m}
    networks:
      - craftalism
    restart: unless-stopped

  # Default (production) behavior: image tags come from VERSION env vars.
  # Pin these in .env (e.g., API_VERSION=v1.2.3) for reproducible production deploys.
  postgres:
    image: postgres:${POSTGRES_VERSION:-18-alpine}@${POSTGRES_DIGEST:?Set POSTGRES_DIGEST to a pinned sha256 digest}
    container_name: craftalism-postgres
    command:
      - postgres
      - -c
      - shared_buffers=${POSTGRES_SHARED_BUFFERS:-128MB}
      - -c
      - work_mem=${POSTGRES_WORK_MEM:-4MB}
      - -c
      - maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM:-64MB}
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_DB: ${DB_NAME:-craftalism}
      POSTGRES_USER: ${DB_USER:-craftalism}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    mem_limit: ${POSTGRES_MEM_LIMIT:-256m}
    mem_reservation: ${POSTGRES_MEM_RESERVATION:-128m}
    networks:
      - craftalism
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-craftalism}"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-db-init:
    image: postgres:${POSTGRES_VERSION:-18-alpine}@${POSTGRES_DIGEST:?Set POSTGRES_DIGEST to a pinned sha256 digest}
    restart: "no"
    environment:
      DB_USER: ${DB_USER:-craftalism}
      PGPASSWORD: ${DB_PASSWORD}
    command:
      - sh
      - -c
      - 'psql -h postgres -U "$DB_USER" -d postgres -tc "SELECT 1 FROM pg_database WHERE datname=''authserver''" | grep -q 1 || psql -h postgres -U "$DB_USER" -d postgres -c "CREATE DATABASE authserver;"'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - craftalism

  auth-server:
    image: ghcr.io/henriquemichelini/craftalism-authorization-server:${AUTH_SERVER_VERSION:?Set AUTH_SERVER_VERSION to an immutable release tag}@${AUTH_SERVER_DIGEST:?Set AUTH_SERVER_DIGEST to the release image sha256 digest}
    container_name: craftalism-auth-server
    environment:
      JAVA_TOOL_OPTIONS: ${AUTH_SERVER_JAVA_TOOL_OPTIONS:--Xms96m -Xmx192m -XX:+UseSerialGC -XX:MaxMetaspaceSize=96m}
      DB_URL: jdbc:postgresql://postgres:5432/authserver
      DB_USER: ${DB_USER:-craftalism}
      DB_PASSWORD: ${DB_PASSWORD}
      RSA_PRIVATE_KEY: ${RSA_PRIVATE_KEY}
      RSA_PUBLIC_KEY: ${RSA_PUBLIC_KEY}
      RSA_ALLOW_EPHEMERAL: ${RSA_ALLOW_EPHEMERAL:-false}
      MINECRAFT_CLIENT_ID: ${MINECRAFT_CLIENT_ID:-minecraft-server}
      MINECRAFT_CLIENT_SECRET: ${MINECRAFT_CLIENT_SECRET}
      AUTH_ISSUER_URI: ${AUTH_ISSUER_URI:?Set AUTH_ISSUER_URI to the canonical auth issuer URL}
    depends_on:
      auth-db-init:
        condition: service_completed_successfully
    ports:
      - "${AUTH_SERVER_HOST:-127.0.0.1}:${AUTH_SERVER_PORT:-9000}:9000"
    mem_limit: ${AUTH_SERVER_MEM_LIMIT:-256m}
    mem_reservation: ${AUTH_SERVER_MEM_RESERVATION:-192m}
    networks:
      - craftalism
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:9000/actuator/health || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  api:
    image: ghcr.io/henriquemichelini/craftalism-api:${API_VERSION:?Set API_VERSION to an immutable release tag}@${API_DIGEST:?Set API_DIGEST to the release image sha256 digest}
    container_name: craftalism-api
    environment:
      JAVA_TOOL_OPTIONS: ${API_JAVA_TOOL_OPTIONS:--Xms128m -Xmx256m -XX:+UseSerialGC -XX:MaxMetaspaceSize=128m}
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-craftalism}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-craftalism}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      AUTH_ISSUER_URI: ${AUTH_ISSUER_URI:?Set AUTH_ISSUER_URI to the canonical auth issuer URL}
    depends_on:
      postgres:
        condition: service_healthy
      auth-server:
        condition: service_healthy
    ports:
      - "${API_HOST:-127.0.0.1}:${API_PORT:-3000}:8080"
    mem_limit: ${API_MEM_LIMIT:-384m}
    mem_reservation: ${API_MEM_RESERVATION:-256m}
    networks:
      - craftalism
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/actuator/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  dashboard:
    image: ghcr.io/henriquemichelini/craftalism-dashboard:${DASHBOARD_VERSION:?Set DASHBOARD_VERSION to an immutable release tag}@${DASHBOARD_DIGEST:?Set DASHBOARD_DIGEST to the release image sha256 digest}
    container_name: craftalism-dashboard
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
      VITE_API_TIMEOUT: ${VITE_API_TIMEOUT:-10000}
      API_UPSTREAM_URL: ${API_UPSTREAM_URL:-http://api:8080}
    depends_on:
      - api
    ports:
      - "${DASHBOARD_HOST:-127.0.0.1}:${DASHBOARD_PORT:-8080}:80"
    mem_limit: ${DASHBOARD_MEM_LIMIT:-96m}
    mem_reservation: ${DASHBOARD_MEM_RESERVATION:-32m}
    networks:
      - craftalism
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:80/",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  minecraft:
    image: itzg/minecraft-server:${MINECRAFT_IMAGE_VERSION:-java21}@${MINECRAFT_IMAGE_DIGEST:?Set MINECRAFT_IMAGE_DIGEST to a pinned sha256 digest}
    container_name: craftalism-minecraft
    environment:
      EULA: "TRUE"
      TYPE: ${MINECRAFT_TYPE:-PAPER}
      VERSION: ${MINECRAFT_VERSION:-1.21.4}
      INIT_MEMORY: ${MINECRAFT_INIT_MEMORY:-512M}
      MEMORY: ${MINECRAFT_MEMORY:-512M}
      MAX_PLAYERS: ${MINECRAFT_MAX_PLAYERS:-20}
      DIFFICULTY: ${MINECRAFT_DIFFICULTY:-normal}
      MODE: ${MINECRAFT_MODE:-survival}
      MOTD: ${MINECRAFT_MOTD:-Craftalism Economy Server}
      ONLINE_MODE: ${MINECRAFT_ONLINE_MODE:-TRUE}
      VIEW_DISTANCE: ${MINECRAFT_VIEW_DISTANCE:-6}
      SIMULATION_DISTANCE: ${MINECRAFT_SIMULATION_DISTANCE:-4}
      ENABLE_RCON: "TRUE"
      RCON_PASSWORD: ${RCON_PASSWORD:?Set RCON_PASSWORD to a strong value}
      RCON_PORT: 25575
      CRAFTALISM_API_URL: http://craftalism-api:8080
      CRAFTALISM_API_KEY: ${MINECRAFT_CLIENT_SECRET}
      AUTH_ISSUER_URI: ${AUTH_ISSUER_URI:?Set AUTH_ISSUER_URI to the canonical auth issuer URL}
      PLUGINS: >-
        https://github.com/HenriqueMichelini/craftalism-economy/releases/download/v${ECONOMY_VERSION:?Set ECONOMY_VERSION to a released plugin version}/craftalism-economy-${ECONOMY_VERSION}.jar,
        https://github.com/HenriqueMichelini/craftalism-market/releases/download/v${MARKET_VERSION:?Set MARKET_VERSION to a released plugin version}/craftalism-market-${MARKET_VERSION}.jar
    volumes:
      - minecraft_data:/data
    ports:
      - "${MINECRAFT_PORT:-25565}:25565"
    mem_limit: ${MINECRAFT_MEM_LIMIT:-768m}
    mem_reservation: ${MINECRAFT_MEM_RESERVATION:-512m}
    networks:
      - craftalism
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    stdin_open: true
    tty: true

volumes:
  caddy_data:
    driver: local
  caddy_config:
    driver: local
  postgres_data:
    driver: local
  minecraft_data:
    driver: local

networks:
  craftalism:
    driver: bridge
