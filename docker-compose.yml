services:
  # Default (production) behavior: image tags come from VERSION env vars.
  # Pin these in .env (e.g., API_VERSION=v1.2.3) for reproducible production deploys.
  # ── PostgreSQL Database ────────────────────────────────────────────────────
  postgres:
    image: postgres:18-alpine
    container_name: craftalism-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-craftalism}
      POSTGRES_USER: ${DB_USER:-craftalism}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - craftalism
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-craftalism}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Auth Server DB Init ────────────────────────────────────────────────────
  # One-shot container that creates the 'authserver' database if it doesn't
  # exist yet. Exits cleanly after running; all other services wait for it.
  auth-db-init:
    image: postgres:18-alpine
    restart: "no"
    environment:
      DB_USER: ${DB_USER:-craftalism}
      PGPASSWORD: ${DB_PASSWORD}
    command:
      - sh
      - -c
      - 'psql -h postgres -U "$DB_USER" -d postgres -tc "SELECT 1 FROM pg_database WHERE datname=''authserver''" | grep -q 1 || psql -h postgres -U "$DB_USER" -d postgres -c "CREATE DATABASE authserver;"'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - craftalism

  # ── Authorization Server ───────────────────────────────────────────────────
  auth-server:
    image: ghcr.io/henriquemichelini/craftalism-authorization-server:${AUTH_SERVER_VERSION:-latest}
    container_name: craftalism-auth-server
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/authserver
      DB_USER: ${DB_USER:-craftalism}
      DB_PASSWORD: ${DB_PASSWORD}
      RSA_PRIVATE_KEY: ${RSA_PRIVATE_KEY}
      RSA_PUBLIC_KEY: ${RSA_PUBLIC_KEY}
      MINECRAFT_CLIENT_ID: ${MINECRAFT_CLIENT_ID:-minecraft-server}
      MINECRAFT_CLIENT_SECRET: ${MINECRAFT_CLIENT_SECRET}
      AUTH_ISSUER_URI: ${AUTH_ISSUER_URI:-http://localhost:9000}
    ports:
      - "${AUTH_SERVER_PORT:-9000}:9000"
    depends_on:
      auth-db-init:
        condition: service_completed_successfully
    networks:
      - craftalism
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:9000/actuator/health || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Craftalism API ─────────────────────────────────────────────────────────
  api:
    image: ghcr.io/henriquemichelini/craftalism-api:${API_VERSION:-latest}
    container_name: craftalism-api
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-craftalism}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-craftalism}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      AUTH_ISSUER_URI: ${AUTH_ISSUER_URI:-http://craftalism-auth-server:9000}
    ports:
      - "${API_PORT:-3000}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      auth-server:
        condition: service_healthy
    networks:
      - craftalism
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/actuator/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Craftalism Dashboard ───────────────────────────────────────────────────
  dashboard:
    image: ghcr.io/henriquemichelini/craftalism-dashboard:${DASHBOARD_VERSION:-latest}
    container_name: craftalism-dashboard
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
      VITE_API_TIMEOUT: ${VITE_API_TIMEOUT:-10000}
      API_UPSTREAM_URL: ${API_UPSTREAM_URL:-http://api:8080}
    ports:
      - "${DASHBOARD_PORT:-8080}:80"
    depends_on:
      - api
    networks:
      - craftalism
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:80/",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Minecraft Server ───────────────────────────────────────────────────────
  minecraft:
    image: itzg/minecraft-server:${MINECRAFT_IMAGE_VERSION:-latest}
    container_name: craftalism-minecraft
    environment:
      EULA: "TRUE"
      TYPE: ${MINECRAFT_TYPE:-PAPER}
      VERSION: ${MINECRAFT_VERSION:-1.21.4}
      MEMORY: ${MINECRAFT_MEMORY:-2G}
      MAX_PLAYERS: ${MINECRAFT_MAX_PLAYERS:-20}
      DIFFICULTY: ${MINECRAFT_DIFFICULTY:-normal}
      MODE: ${MINECRAFT_MODE:-survival}
      MOTD: ${MINECRAFT_MOTD:-Craftalism Economy Server}
      ONLINE_MODE: ${MINECRAFT_ONLINE_MODE:-FALSE}
      VIEW_DISTANCE: ${MINECRAFT_VIEW_DISTANCE:-10}
      SIMULATION_DISTANCE: ${MINECRAFT_SIMULATION_DISTANCE:-10}
      ENABLE_RCON: "TRUE"
      RCON_PASSWORD: ${RCON_PASSWORD}
      RCON_PORT: 25575
      CRAFTALISM_API_URL: http://craftalism-api:8080
      CRAFTALISM_API_KEY: ${MINECRAFT_CLIENT_SECRET}
      AUTH_ISSUER_URI: ${AUTH_ISSUER_URI:-http://craftalism-auth-server:9000}
      PLUGINS: >-
        https://github.com/HenriqueMichelini/craftalism-economy/releases/download/v${ECONOMY_VERSION}/craftalism-economy-${ECONOMY_VERSION}.jar
    volumes:
      - minecraft_data:/data
    ports:
      - "${MINECRAFT_PORT:-25565}:25565"
      - "25575:25575"
    networks:
      - craftalism
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    stdin_open: true
    tty: true

volumes:
  postgres_data:
    driver: local
  minecraft_data:
    driver: local

networks:
  craftalism:
    driver: bridge
