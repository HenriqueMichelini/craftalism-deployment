services:
  # Test mode override: build services from explicit local paths.
  auth-server:
    image: craftalism-dev/auth-server:main
    build:
      context: ${AUTH_SERVER_BUILD_CONTEXT:?AUTH_SERVER_BUILD_CONTEXT is required in test mode}
      dockerfile: ${AUTH_SERVER_DOCKERFILE:?AUTH_SERVER_DOCKERFILE is required in test mode}
    pull_policy: never

  api:
    image: craftalism-dev/api:main
    build:
      context: ${API_BUILD_CONTEXT:?API_BUILD_CONTEXT is required in test mode}
      dockerfile: ${API_DOCKERFILE:?API_DOCKERFILE is required in test mode}
    pull_policy: never

  dashboard:
    image: craftalism-dev/dashboard:main
    build:
      context: ${DASHBOARD_BUILD_CONTEXT:?DASHBOARD_BUILD_CONTEXT is required in test mode}
      dockerfile: ${DASHBOARD_DOCKERFILE:?DASHBOARD_DOCKERFILE is required in test mode}
    pull_policy: never

  minecraft:
    # Test mode uses a locally built economy plugin jar mounted into plugins/.
    environment:
      PLUGINS: ""
    volumes:
      - minecraft_data:/data
      - ${ECONOMY_PLUGIN_JAR_PATH:?ECONOMY_PLUGIN_JAR_PATH is required in test mode}:/data/plugins/craftalism-economy.jar:ro
