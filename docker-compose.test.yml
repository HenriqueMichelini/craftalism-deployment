services:
  # Test mode: use mutable tags (latest/dev) instead of production pins.
  # You can override each test tag via env vars below.

  auth-server:
    image: ghcr.io/henriquemichelini/craftalism-authorization-server:${AUTH_SERVER_TEST_VERSION:-latest}

  api:
    image: ghcr.io/henriquemichelini/craftalism-api:${API_TEST_VERSION:-latest}

  dashboard:
    image: ghcr.io/henriquemichelini/craftalism-dashboard:${DASHBOARD_TEST_VERSION:-latest}
